version: "3.9"

services:

  frontend:
    build: ./frontend
    container_name: sn-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sn-network

  backend:
    build: ./backend
    container_name: sn-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/servicenow
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_API_VERSION=2024-02-15-preview
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME:-gpt-4}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - postgres
      - chromadb
    volumes:
      - ./data:/app/data
    networks:
      - sn-network

  postgres:
    image: postgres:16
    container_name: sn-postgres
    restart: always
    environment:
      POSTGRES_DB: servicenow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sn-network

  chromadb:
    image: chromadb/chroma
    container_name: sn-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - sn-network

volumes:
  postgres_data:
  chroma_data:

networks:
  sn-network: